name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r desktop/requirements.txt

      - name: Build EXE
        run: |
          cd desktop
          pyinstaller --onefile --windowed --name "ATB-Yen-Rate" --add-data "bg.jpg;." app.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ATB-Yen-Rate-Windows
          path: desktop/dist/ATB-Yen-Rate.exe
